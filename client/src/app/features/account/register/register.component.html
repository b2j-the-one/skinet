<mat-card class="max-w-lg mx-auto mt-32 p-8 bg-white">
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-semibold text-primary">Inscription</h1>
    </div>
    <app-text-input label="Prénom" formControlName="firstName" />
    <!-- <mat-form-field appearance="outline" class="w-full mb-4">
      <mat-label>Prénom</mat-label>
      <input formControlName="firstName" type="text" placeholder="Entrez votre prénom" matInput />
      @if (registerForm.get('firstName')?.hasError('required')) {
        <mat-error>Le prénom est obligatoire</mat-error>
      }
    </mat-form-field> -->
    <app-text-input label="Nom" formControlName="lastName" />
    <app-text-input label="Adresse mail" formControlName="email" />
    <app-text-input label="Mot de passe" formControlName="password" type="password" />

    @if (validationErrors) {
      <div class="mb-3 p-4 bg-red-100 text-red-600">
        <ul class="list-disc px-3">
          @for (error of validationErrors; track $index) {
            <li>{{ error }}</li>
          }
        </ul>
      </div>
    }
    <button [disabled]="registerForm.invalid" mat-flat-button type="submit" class="w-full py-2">
      S'inscrire
    </button>
  </form>
</mat-card>
